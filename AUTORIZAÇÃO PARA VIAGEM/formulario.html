<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Autorização para Viagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>Gerar Autorização para Viagem</h1>
        </header>

         <form action="destino.html" method="GET" onsubmit="return validarFormulario()"></form>
        
        <section>
            <form action="autorizacao.html" method="GET">
                <div class="campo">
                    <label for="nomeAluno" >Nome Completo:</label>
                    <input type="text" id="nomeAluno" name="nomeAluno" placeholder="Ex: Maria Luisa da Silva">
                </div>

                <div class="campo">
                    <label for="cpf" >CPF:</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="campo">
                    <label for="idade" >Idade:</label>
                    <input type="number" id="idade" name="idade" placeholder="Ex: 12" required>
                </div>

                <div class="campo">
                    <label for="nomeResponsavel">Nome do Responsável:</label>
                    <input type="text" id="nomeResponsavel" name="nomeResponsavel" placeholder="Ex: João da Silva" required>
                </div>

                <div class="campo">
                    <label for="cidadeDeOrigem">Cidade de origem:</label>
                    <input type="text" id="cidadeDeOrigem" name="cidadeDeOrigem" placeholder="Ex: Campo Mourão - PR" required>
                </div>

                <div class="campo">
                    <label for="cidadeDeDestino">Cidade de destino:</label>
                    <input type="text" id="cidadeDeDestino" name="cidadeDeDestino" placeholder="Ex: Curitiba - PR" required>
                </div>

                <div class="campo">
                    <label for="modalidade">Modalidade esportiva:</label>
                    <select id="modalidade" name="modalidade" required>
                        <option value="">Selecione</option>
                        <option value="futebol">Futebol</option>
                        <option value="volei">Vôlei</option>
                        <option value="natação">Natação</option>
                        </select>
                </div>

                <button type="submit">Gerar Documento Oficial</button>
            </form>
        </section>
    </main>

    <script>
        
        function validarFormulario() {
            const nomeAluno = document.getElementById('nomeAluno').value.trim();
            const cpfDigitado = document.getElementById('cpf').value.trim();
            const idade = document.getElementById('idade').value.trim();
            const nomeResponsavel = document.getElementById('nomeResponsavel').value.trim();
            const cidadeDeOrigem = document.getElementById('cidadeDeOrigem').value.trim();
            const cidadeDeDestino = document.getElementById('cidadeDeDestino').value.trim();
            const modalidade = document.getElementById('modalidade').value;

            if (!nomeAluno || !cpfDigitado || !idade || !nomeResponsavel || !cidadeDeOrigem || !cidadeDeDestino || !modalidade) {
                alert('Por favor, preencha todos os campos.');
                return false;
            }

             if (cpfDigitado.length < 11) {
                alert("Por favor, digite um CPF válido com pelo menos 11 números.");
                return false; // O 'false' impede que o formulário vá para a outra página
            }

            if (idade < 7) {
                alert('O aluno deve ter pelo menos 7 anos para competir.');
                return false;
            } else if (idade <12) {
                alert('O atleta deve ser classificado na categoria Criança.');
                return true;
            } else if (idade < 14) {
                alert('O atleta deve ser classificado na categoria Pré-adolescente.');
                return true;
            } else if (idade < 19) {
                alert('O atleta deve ser classificado na categoria Adolescente.');
                return true;
            } else {
                alert('O atleta deve ser menor de 18 anos para competir.');
                return true;
            }


            return true; // Permite o envio do formulário
        }
        </script>

</body>
</html>
