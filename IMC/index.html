<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>
    <link rel="stylesheet" href="imc.css">
</head>
<body>
    <header>Calcule seu IMC</header>

    <main> 
        <section>
            <h1>Indice de massa corporal</h1>
            <label for="altura">Altura (m) </label>
            <input type="number" id="inputAltura"> 
            <br>
            <label for="peso">Peso (kg) </label>
            <input type="number" id="inputPeso">
            <br><br>
            <button onclick="calcular()">Calcular</button>
            <label for="resultado" id="resultado"></label>
            <span id="resp"></span>
            <span id="resultado"></span>
        </section>
    </main>

    <footer id="footer">
        <span id="mensagem">Preencha os valores e calcule</span>
    </footer>

    <script src="script.js"></script>

</body>
</html>
