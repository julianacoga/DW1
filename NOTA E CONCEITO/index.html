<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota e conceito</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Notas e Conceito</h1>

        <label for="RA">RA:</label>
        <input type="number" id="inputRA">

        <label for="nome">Nome do aluno:</label>
        <input type="text" id="inputNome">

        <label for="nota1">Nota 1:</label>
        <input type="number" id="inputNota1">

        <label for="nota2">Nota 2:</label>
        <input type="number" id="inputNota2">

        <label for="nota3">Nota 3:</label>
        <input type="number" id="inputNota3">

        <label for="nota4">Nota 4:</label>
        <input type="number" id="inputNota4">

        <label for="mediaExercicio">Média de exercícios:</label>
        <input type="number" id="inputMediaExercicio">

        <button id="btCalcular">Calcular</button>

        <div id="resultado"></div>
    </div>

    <footer id="footer">Preencha os valores e calcule</footer>
    <script src="script.js"></script>
</body>
</html>
